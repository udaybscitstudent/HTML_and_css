<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather for casting</title>
    <!-- <link rel="stylesheet" href="weather.css"> -->
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> 
</head>
<body class="bg-gradient-to-r from-blue-400 to-purple-500 h-screen flex items-center justify-center">
    <div class="card w-[400px] h-[500px] bg-white/30 backdrop-blur-lg rounded-lg shadow-lg p-10">
        <div class="search flex items-center justify-center mb-6 px-3 relative border-2 border-gray-400 rounded-full bg-gray-200">
            <input type="text" name="search" placeholder="enter city name" spellcheck="false" class="w-full p-1.5 rounded-full outline-none text-lg">
            <button class="" onsubmit="cityValue()"><i class="bi bi-search w-6 h-6 cursor-pointer"></i></button>
        </div>
        <div class="weather text-center text-white">
            <img src="rain.png" class="whether-icon mx-auto size-40">
            <h1 class="temp text-2xl font-bold">22°c</h1>
            <h2 class="city text-xl font-semibold">patna</h2>
            <div class="details flex items-center justify-between mt-6">
                <div class="col">
                    <img src="humidity.png" class="mx-auto size-16">
                    <div>
                        <p class="humidity">50%</p>
                        <p>humidity</p>
                    </div>
                </div><div class="col">
                    <img src="wind.png" class="size-16 mx-auto">
                    <div>
                        <p class="wind">15km/h</p>
                        <p>wind speed</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="weather.js"></script>
</body>
</html>
